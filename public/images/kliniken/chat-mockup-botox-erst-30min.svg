<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="600" height="620" fill="#fafafa" rx="20"/>

  <!-- Header label -->
  <g transform="translate(32, 32)">
    <text x="0" y="14" fill="#999" font-size="10" letter-spacing="1.5" font-weight="500">BEISPIEL 2 · BOTOX · ERSTPATIENTIN</text>
    <rect x="450" y="0" width="86" height="22" rx="6" fill="#ecfdf5"/>
    <text x="493" y="15" fill="#059669" font-size="11" font-weight="500" font-family="ui-monospace, monospace" text-anchor="middle">30 MIN</text>
  </g>
  <line x1="32" y1="68" x2="568" y2="68" stroke="#e5e5e5" stroke-width="0.5"/>

  <!-- Patient -->
  <g transform="translate(32, 92)">
    <rect width="380" height="60" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"/>
    <text x="14" y="25" fill="#0a0a0a" font-size="13">Ich war noch nie bei einer Schönheitsbehandlung.</text>
    <text x="14" y="45" fill="#0a0a0a" font-size="13">Was ist Botox eigentlich genau?</text>
  </g>

  <!-- AI -->
  <g transform="translate(80, 176)">
    <rect width="488" height="180" rx="12" fill="#0a0a0a"/>
    <text x="16" y="26" fill="#ffffff" font-size="13">Schön, dass Sie sich erkundigen — wir nehmen uns</text>
    <text x="16" y="46" fill="#ffffff" font-size="13">gerne Zeit für Ihre Fragen. Botox ist ein Wirkstoff,</text>
    <text x="16" y="66" fill="#ffffff" font-size="13">der gezielt einzelne Gesichtsmuskeln entspannt,</text>
    <text x="16" y="86" fill="#ffffff" font-size="13">am häufigsten gegen Stirn- und Zornesfalten.</text>
    <text x="16" y="116" fill="#ffffff" font-size="13">Da es Ihre erste Behandlung wäre, planen wir</text>
    <text x="16" y="136" fill="#ffffff" font-size="13">30 Minuten ein: wir besprechen Ihre Anliegen,</text>
    <text x="16" y="156" fill="#ffffff" font-size="13">klären medizinische Fragen und schauen, ob die</text>
    <text x="16" y="172" fill="#ffffff" font-size="13">Behandlung für Sie passt.</text>
  </g>

  <!-- Booking card -->
  <g transform="translate(80, 388)">
    <rect width="488" height="64" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="16" y="16" width="32" height="32" rx="6" fill="#f5f5f5"/>
    <text x="32" y="38" fill="#0a0a0a" font-size="16" text-anchor="middle">📅</text>
    <text x="60" y="32" fill="#0a0a0a" font-size="14" font-weight="500">Botox-Erstberatung</text>
    <text x="60" y="50" fill="#666" font-size="12" font-family="ui-monospace, monospace">30 Minuten</text>
  </g>

  <!-- Footer caption -->
  <text x="300" y="510" fill="#999" font-size="12" text-anchor="middle">Erstpatientin-Signal erkannt → erweiterter Slot</text>
</svg>
