<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="600" height="620" fill="#fafafa" rx="20"/>

  <!-- Header label -->
  <g transform="translate(32, 32)">
    <text x="0" y="14" fill="#999" font-size="10" letter-spacing="1.5" font-weight="500">BEISPIEL 3 · LIPOSUKTION</text>
    <rect x="450" y="0" width="86" height="22" rx="6" fill="#fef3c7"/>
    <text x="493" y="15" fill="#b45309" font-size="11" font-weight="500" font-family="ui-monospace, monospace" text-anchor="middle">45 MIN</text>
  </g>
  <line x1="32" y1="68" x2="568" y2="68" stroke="#e5e5e5" stroke-width="0.5"/>

  <!-- Patient -->
  <g transform="translate(32, 92)">
    <rect width="340" height="40" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"/>
    <text x="14" y="25" fill="#0a0a0a" font-size="13">Ich interessiere mich für eine Liposuktion am Bauch.</text>
  </g>

  <!-- AI -->
  <g transform="translate(80, 156)">
    <rect width="488" height="200" rx="12" fill="#0a0a0a"/>
    <text x="16" y="26" fill="#ffffff" font-size="13">Gerne — eine Liposuktion am Bauch ist eine unserer</text>
    <text x="16" y="46" fill="#ffffff" font-size="13">häufigsten Behandlungen. Die Kosten starten bei</text>
    <text x="16" y="66" fill="#ffffff" font-size="13">CHF 4'500 und hängen vom Behandlungsumfang</text>
    <text x="16" y="86" fill="#ffffff" font-size="13">sowie der angewendeten Methode (z.B. tumeszenz</text>
    <text x="16" y="106" fill="#ffffff" font-size="13">oder lasergestützt) ab.</text>
    <text x="16" y="136" fill="#ffffff" font-size="13">Für die Erstberatung nehmen wir uns 45 Minuten</text>
    <text x="16" y="156" fill="#ffffff" font-size="13">Zeit: dort besprechen wir Ihre Ziele, führen eine</text>
    <text x="16" y="176" fill="#ffffff" font-size="13">erste Untersuchung durch und klären alle Fragen</text>
    <text x="16" y="192" fill="#ffffff" font-size="13">rund um den Eingriff.</text>
  </g>

  <!-- Booking card -->
  <g transform="translate(80, 388)">
    <rect width="488" height="64" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="16" y="16" width="32" height="32" rx="6" fill="#f5f5f5"/>
    <text x="32" y="38" fill="#0a0a0a" font-size="16" text-anchor="middle">📅</text>
    <text x="60" y="32" fill="#0a0a0a" font-size="14" font-weight="500">Liposuktion-Beratung</text>
    <text x="60" y="50" fill="#666" font-size="12" font-family="ui-monospace, monospace">45 Minuten</text>
  </g>

  <!-- Footer caption -->
  <text x="300" y="510" fill="#999" font-size="12" text-anchor="middle">Komplexer Eingriff → ausführlicher Slot</text>
</svg>
