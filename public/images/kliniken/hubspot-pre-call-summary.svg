<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="1000" height="600" fill="#f6f9fc" rx="12"/>

  <!-- Top toolbar -->
  <rect x="0" y="0" width="1000" height="48" fill="#ffffff" rx="12"/>
  <rect x="0" y="36" width="1000" height="12" fill="#ffffff"/>
  <line x1="0" y1="48" x2="1000" y2="48" stroke="#e5e5e5" stroke-width="0.5"/>
  <circle cx="22" cy="24" r="6" fill="#ff5d5b"/>
  <circle cx="42" cy="24" r="6" fill="#ffbb44"/>
  <circle cx="62" cy="24" r="6" fill="#00ca56"/>
  <text x="500" y="29" fill="#999" font-size="11" text-anchor="middle" font-family="ui-monospace, monospace">app.hubspot.com / contacts / 47281</text>

  <!-- Left contact column -->
  <g transform="translate(24, 72)">
    <rect width="280" height="504" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"/>

    <!-- Avatar + name -->
    <circle cx="140" cy="50" r="32" fill="#0a0a0a"/>
    <text x="140" y="58" fill="#ffffff" font-size="20" font-weight="500" text-anchor="middle">M.S.</text>
    <text x="140" y="108" fill="#0a0a0a" font-size="16" font-weight="500" text-anchor="middle">Maria S██████</text>
    <text x="140" y="128" fill="#666" font-size="12" text-anchor="middle">Lead · Erstellt heute, 21:48</text>

    <line x1="20" y1="156" x2="260" y2="156" stroke="#e5e5e5" stroke-width="0.5"/>

    <!-- Contact properties -->
    <text x="20" y="184" fill="#999" font-size="10" letter-spacing="1.2" font-weight="500">KONTAKT</text>

    <text x="20" y="212" fill="#666" font-size="11">Email</text>
    <text x="20" y="230" fill="#0a0a0a" font-size="12" font-family="ui-monospace, monospace">m.s████@█████.ch</text>

    <text x="20" y="258" fill="#666" font-size="11">Telefon</text>
    <text x="20" y="276" fill="#0a0a0a" font-size="12" font-family="ui-monospace, monospace">+41 79 ███ ██ ██</text>

    <text x="20" y="304" fill="#666" font-size="11">Quelle</text>
    <text x="20" y="322" fill="#0a0a0a" font-size="12">WhatsApp · Eingehend</text>

    <text x="20" y="350" fill="#666" font-size="11">Status</text>
    <rect x="20" y="358" width="92" height="22" rx="11" fill="#ecfdf5"/>
    <text x="66" y="373" fill="#059669" font-size="11" font-weight="500" text-anchor="middle">Termin gebucht</text>

    <text x="20" y="404" fill="#666" font-size="11">Behandlungs-Interesse</text>
    <text x="20" y="422" fill="#0a0a0a" font-size="12">Liposuktion (Bauch)</text>

    <text x="20" y="450" fill="#666" font-size="11">Termin</text>
    <text x="20" y="468" fill="#0a0a0a" font-size="12" font-family="ui-monospace, monospace">14.05.2026 · 14:00–14:45</text>
  </g>

  <!-- Right main column with lead_intent_summary highlighted -->
  <g transform="translate(324, 72)">
    <rect width="652" height="504" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"/>

    <text x="24" y="36" fill="#0a0a0a" font-size="16" font-weight="500">Pre-Call-Briefing</text>
    <text x="24" y="56" fill="#666" font-size="12">Automatisch erstellt durch KI-Assistent · 8 Sekunden vor Buchung</text>

    <line x1="24" y1="76" x2="628" y2="76" stroke="#e5e5e5" stroke-width="0.5"/>

    <!-- Highlighted summary card -->
    <rect x="24" y="100" width="604" height="280" rx="12" fill="#fef9c3" stroke="#facc15" stroke-width="1"/>
    <text x="44" y="128" fill="#854d0e" font-size="10" letter-spacing="1.2" font-weight="500">LEAD_INTENT_SUMMARY (BENUTZERDEFINIERTES FELD)</text>

    <text x="44" y="160" fill="#0a0a0a" font-size="13" font-weight="500">Ziel der Patientin</text>
    <text x="44" y="180" fill="#1f2937" font-size="12">Reduktion von Bauchfett, hauptsächlich Unterbauchbereich nach</text>
    <text x="44" y="198" fill="#1f2937" font-size="12">Schwangerschaft. Sport und Diät haben nicht zum gewünschten Ergebnis geführt.</text>

    <text x="44" y="226" fill="#0a0a0a" font-size="13" font-weight="500">Vorerfahrungen</text>
    <text x="44" y="246" fill="#1f2937" font-size="12">Keine bisherigen ästhetischen Eingriffe. Patientin hat sich umfassend</text>
    <text x="44" y="264" fill="#1f2937" font-size="12">informiert (Ärztezeitung, Erfahrungsberichte).</text>

    <text x="44" y="292" fill="#0a0a0a" font-size="13" font-weight="500">Budget &amp; Timing</text>
    <text x="44" y="312" fill="#1f2937" font-size="12">CHF 5'000–8'000 verfügbar. Wunschtermin Eingriff: Sommer 2026.</text>

    <text x="44" y="340" fill="#0a0a0a" font-size="13" font-weight="500">Offene Fragen für das Gespräch</text>
    <text x="44" y="360" fill="#1f2937" font-size="12">• Methodenvergleich (tumeszenz vs. lasergestützt)  • Ausfallzeit  • Narben</text>

    <!-- Activity timeline preview -->
    <text x="24" y="416" fill="#999" font-size="10" letter-spacing="1.2" font-weight="500">AKTIVITÄT</text>
    <circle cx="36" cy="438" r="4" fill="#10b981"/>
    <text x="50" y="442" fill="#0a0a0a" font-size="12">Termin gebucht · Liposuktion-Beratung 45 Min</text>
    <text x="580" y="442" fill="#999" font-size="11" text-anchor="end">21:48</text>

    <circle cx="36" cy="462" r="4" fill="#6366f1"/>
    <text x="50" y="466" fill="#0a0a0a" font-size="12">KI-Konversation abgeschlossen · 4 Nachrichten</text>
    <text x="580" y="466" fill="#999" font-size="11" text-anchor="end">21:48</text>

    <circle cx="36" cy="486" r="4" fill="#6366f1"/>
    <text x="50" y="490" fill="#0a0a0a" font-size="12">WhatsApp-Anfrage eingegangen</text>
    <text x="580" y="490" fill="#999" font-size="11" text-anchor="end">21:47</text>
  </g>
</svg>
