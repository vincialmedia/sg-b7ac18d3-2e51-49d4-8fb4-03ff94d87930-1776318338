<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="600" height="720" fill="#fafafa" rx="20"/>

  <!-- Header -->
  <g transform="translate(32, 32)">
    <circle cx="22" cy="22" r="22" fill="#0a0a0a"/>
    <text x="22" y="28" fill="#ffffff" font-size="13" font-weight="500" text-anchor="middle">AK</text>
    <text x="58" y="20" fill="#0a0a0a" font-size="15" font-weight="500">Aesthetic Klinik AG</text>
    <circle cx="62" cy="35" r="3" fill="#10b981"/>
    <text x="72" y="39" fill="#10b981" font-size="12">Antwortet in Sekunden</text>
  </g>
  <line x1="32" y1="92" x2="568" y2="92" stroke="#e5e5e5" stroke-width="0.5"/>

  <!-- Patient message 1 -->
  <g transform="translate(32, 116)">
    <rect width="320" height="40" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"/>
    <text x="14" y="25" fill="#0a0a0a" font-size="13">Was kostet Botox bei Ihnen?</text>
    <text x="0" y="58" fill="#999" font-size="11">Sonntag · 21:47</text>
  </g>

  <!-- AI response 1 -->
  <g transform="translate(80, 195)">
    <rect width="488" height="120" rx="12" fill="#0a0a0a"/>
    <text x="16" y="26" fill="#ffffff" font-size="13">Guten Tag! Botox-Behandlungen starten bei uns ab</text>
    <text x="16" y="46" fill="#ffffff" font-size="13">CHF 350, abhängig vom Areal — Stirn, Zornesfalte</text>
    <text x="16" y="66" fill="#ffffff" font-size="13">oder Krähenfüsse. Für die Erstberatung</text>
    <text x="16" y="86" fill="#ffffff" font-size="13">reservieren wir 15 Minuten: genug Zeit, um Ihre</text>
    <text x="16" y="106" fill="#ffffff" font-size="13">Wünsche und das Vorgehen zu besprechen.</text>
    <text x="488" y="142" fill="#999" font-size="11" text-anchor="end">21:47 · 23 Sek. später</text>
  </g>

  <!-- Patient message 2 -->
  <g transform="translate(32, 365)">
    <rect width="240" height="40" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"/>
    <text x="14" y="25" fill="#0a0a0a" font-size="13">Klingt gut. Wann wäre Zeit?</text>
    <text x="0" y="58" fill="#999" font-size="11">21:48</text>
  </g>

  <!-- AI response 2 with booking card -->
  <g transform="translate(80, 444)">
    <rect width="488" height="40" rx="12" fill="#0a0a0a"/>
    <text x="16" y="25" fill="#ffffff" font-size="13">Hier können Sie direkt einen Termin auswählen:</text>
  </g>

  <g transform="translate(80, 504)">
    <rect width="488" height="64" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="16" y="16" width="32" height="32" rx="6" fill="#f5f5f5"/>
    <text x="32" y="38" fill="#0a0a0a" font-size="16" text-anchor="middle">📅</text>
    <text x="60" y="32" fill="#0a0a0a" font-size="14" font-weight="500">Botox-Beratung</text>
    <text x="60" y="50" fill="#666" font-size="12" font-family="ui-monospace, monospace">15 Minuten · vor Ort oder Video</text>
    <text x="468" y="38" fill="#666" font-size="14" text-anchor="end">→</text>
  </g>
  <text x="568" y="586" fill="#999" font-size="11" text-anchor="end">21:48 · 31 Sek. später</text>

  <!-- Footer -->
  <line x1="32" y1="638" x2="568" y2="638" stroke="#e5e5e5" stroke-width="0.5"/>
  <text x="300" y="668" fill="#999" font-size="11" text-anchor="middle">Geführt vom KI-Assistenten · Beispielkonversation</text>
</svg>
