<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="600" height="540" fill="#fafafa" rx="20"/>

  <!-- Header label -->
  <g transform="translate(32, 32)">
    <text x="0" y="14" fill="#999" font-size="10" letter-spacing="1.5" font-weight="500">BEISPIEL 1 · STANDARD BOTOX</text>
    <rect x="450" y="0" width="86" height="22" rx="6" fill="#eef2ff"/>
    <text x="493" y="15" fill="#4f46e5" font-size="11" font-weight="500" font-family="ui-monospace, monospace" text-anchor="middle">15 MIN</text>
  </g>
  <line x1="32" y1="68" x2="568" y2="68" stroke="#e5e5e5" stroke-width="0.5"/>

  <!-- Patient -->
  <g transform="translate(32, 92)">
    <rect width="280" height="40" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"/>
    <text x="14" y="25" fill="#0a0a0a" font-size="13">Was kostet Botox bei Ihnen?</text>
  </g>

  <!-- AI -->
  <g transform="translate(80, 156)">
    <rect width="488" height="120" rx="12" fill="#0a0a0a"/>
    <text x="16" y="26" fill="#ffffff" font-size="13">Guten Tag! Botox-Behandlungen starten bei uns ab</text>
    <text x="16" y="46" fill="#ffffff" font-size="13">CHF 350, abhängig vom Areal — Stirn, Zornesfalte</text>
    <text x="16" y="66" fill="#ffffff" font-size="13">oder Krähenfüsse. Für die Erstberatung reservieren</text>
    <text x="16" y="86" fill="#ffffff" font-size="13">wir 15 Minuten: genug Zeit, um Ihre Wünsche und</text>
    <text x="16" y="106" fill="#ffffff" font-size="13">das passende Vorgehen zu besprechen.</text>
  </g>

  <!-- Booking card -->
  <g transform="translate(80, 308)">
    <rect width="488" height="64" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="16" y="16" width="32" height="32" rx="6" fill="#f5f5f5"/>
    <text x="32" y="38" fill="#0a0a0a" font-size="16" text-anchor="middle">📅</text>
    <text x="60" y="32" fill="#0a0a0a" font-size="14" font-weight="500">Botox-Beratung</text>
    <text x="60" y="50" fill="#666" font-size="12" font-family="ui-monospace, monospace">15 Minuten</text>
  </g>

  <!-- Footer caption -->
  <text x="300" y="430" fill="#999" font-size="12" text-anchor="middle">Standardanfrage → Standarddauer aus der Behandlungsliste</text>
</svg>
